<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NHN LINK 제휴 제안서</title>
<style>
  :root{
    /* ===== Black & White 리브랜딩 팔레트 (티켓링크 CI/BI) ===== */
    --navy-900:#141414;
    --navy-800:#1f1f1f;
    --navy-700:#2b2b2b;
    --navy-600:#3d3d3d;
    --navy-500:#565656;
    --navy-300:#9b9b9b;
    --navy-100:#e6e6e6;
    --navy-50:#f4f4f4;
    --ink:#1a1a1a;
    --muted:#6c6c6c;
    --line:#e4e4e4;
    --accent:#e8112d;
    --accent-soft:#fdebed;
    --bg:#f5f5f5;
    --card:#ffffff;
    --sidebar-w:288px;
    --topbar-h:62px;
    --shadow:0 1px 3px rgba(20,20,20,.06),0 8px 24px rgba(20,20,20,.07);
    --font:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }

  /* ===== Top bar ===== */
  .topbar{
    position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
    background:var(--navy-900);color:#fff;z-index:30;
    display:flex;align-items:center;gap:16px;padding:0 22px;
    box-shadow:0 2px 10px rgba(13,27,52,.18);
  }
  .topbar .menu-btn{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
    color:#fff;width:38px;height:38px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;transition:.15s;
  }
  .topbar .menu-btn:hover{background:rgba(255,255,255,.16)}
  .brand{display:flex;align-items:baseline;gap:10px;min-width:0}
  .brand .logo{font-weight:800;letter-spacing:.5px;font-size:18px;white-space:nowrap}
  .brand .logo .dot{color:var(--accent)}
  .brand .sub{font-size:13px;color:#c4c4c4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .ver{margin-left:auto;font-size:12px;color:#a8a8a8;flex:none;letter-spacing:.3px}

  /* ===== Layout ===== */
  .shell{display:flex;padding-top:var(--topbar-h);min-height:100vh}

  /* ===== Sidebar / TOC ===== */
  .sidebar{
    position:fixed;top:var(--topbar-h);bottom:0;left:0;width:var(--sidebar-w);
    background:#fff;border-right:1px solid var(--line);
    overflow-y:auto;z-index:20;transition:transform .22s ease;
  }
  .sidebar::-webkit-scrollbar{width:8px}
  .sidebar::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:8px}
  .toc-head{padding:18px 20px 8px;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--navy-300);text-transform:uppercase}
  .toc{padding:0 12px 28px;list-style:none}
  .toc .grp>button{
    width:100%;text-align:left;background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:14.5px;font-weight:700;color:var(--navy-800);
    padding:11px 12px;border-radius:9px;display:flex;align-items:center;gap:9px;transition:.13s;
  }
  .toc .grp>button:hover{background:var(--navy-50)}
  .toc .grp>button .chev{margin-left:auto;transition:.2s;color:var(--navy-300);font-size:11px}
  .toc .grp.collapsed>button .chev{transform:rotate(-90deg)}
  .toc .grp>button .ico{width:22px;text-align:center;font-size:13px;color:var(--navy-500)}
  .toc .sub{list-style:none;overflow:hidden;transition:max-height .25s ease;max-height:600px}
  .toc .grp.collapsed .sub{max-height:0}
  .toc .sub li a{
    display:block;text-decoration:none;color:var(--muted);font-size:13.5px;
    padding:7px 12px 7px 43px;border-radius:8px;cursor:pointer;transition:.12s;
    border-left:2px solid transparent;
  }
  .toc .sub li a:hover{background:var(--navy-50);color:var(--navy-700)}
  .toc .sub li a.active{background:var(--navy-700);color:#fff;font-weight:600}
  .toc .grp>button.lone{font-weight:700}

  /* ===== Main ===== */
  .main{flex:1;margin-left:var(--sidebar-w);transition:margin-left .22s ease;min-width:0}
  body.nav-collapsed .sidebar{transform:translateX(-100%)}
  body.nav-collapsed .main{margin-left:0}
  .scrim{display:none}

  .page-wrap{max-width:1100px;margin:0 auto;padding:34px 40px 60px}
  .page{display:none;animation:fade .28s ease}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .kicker{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--navy-500);text-transform:uppercase;margin-bottom:8px}
  .page h1{font-size:27px;font-weight:800;color:var(--navy-900);letter-spacing:-.3px;line-height:1.25}
  .page .lead{margin-top:12px;color:var(--muted);font-size:15px;max-width:820px}
  .divider{height:3px;width:46px;background:var(--accent);border-radius:3px;margin:16px 0 26px}

  /* cover */
  .cover{background:linear-gradient(135deg,var(--navy-900),var(--navy-700));color:#fff;border-radius:18px;padding:56px 48px;box-shadow:var(--shadow)}
  .cover .logo{font-size:30px;font-weight:800;letter-spacing:.5px}
  .cover .logo .dot{color:var(--accent)}
  .cover h1{color:#fff;font-size:34px;margin-top:22px}
  .cover .en{color:#c4c4c4;margin-top:10px;font-size:16px}
  .cover .ver{margin-top:34px;display:inline-block;font-size:13px;color:#d6d6d6;border:1px solid rgba(255,255,255,.22);padding:7px 16px;border-radius:30px}
  .cover .bar{height:4px;width:64px;background:var(--accent);border-radius:4px;margin-top:26px}
  #page-cover{position:relative;min-height:60vh}
  .cover-guide{position:absolute;left:0;bottom:0;max-width:760px;font-size:11px;line-height:1.55;color:#9a9a9a}
  .cover .sns{margin-top:26px;display:flex;gap:10px;flex-wrap:wrap}
  .cover .sns .ico-tile{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.20);display:flex;align-items:center;justify-content:center;transition:.15s}
  .cover .sns .ico-tile:hover{background:rgba(255,255,255,.22)}
  .cover .sns .ico-tile svg{width:21px;height:21px;display:block}

  /* stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:8px 0 30px}
  .stat{background:var(--navy-800);color:#fff;border-radius:13px;padding:20px 18px;box-shadow:var(--shadow)}
  .stat .num{font-size:25px;font-weight:800;letter-spacing:-.5px}
  .stat .lbl{margin-top:6px;font-size:12.5px;color:#c4c4c4}

  .seg-title{font-size:17px;font-weight:800;color:var(--navy-900);margin:24px 0 14px;display:flex;align-items:center;gap:9px}
  .seg-title::before{content:"";width:4px;height:17px;background:var(--accent);border-radius:3px}

  .demo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .demo{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px;box-shadow:var(--shadow)}
  .demo .dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .demo .tag{font-weight:800;font-size:14px;color:#fff;padding:3px 12px;border-radius:20px}
  .demo .ratio{font-size:12px;color:var(--muted);margin:6px 0 12px}
  .bar-row{margin-bottom:9px}
  .bar-row .b-lab{font-size:12.5px;color:var(--ink);margin-bottom:4px;font-weight:600}
  .bar-track{height:9px;background:var(--navy-50);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px}

  /* ===== 제휴 혜택 카드 ===== */
  .benefit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media(max-width:880px){.benefit-grid{grid-template-columns:1fr}}
  .benefit{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:24px;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .benefit .bnum{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:var(--navy-900);color:#fff;font-weight:800;font-size:15px;flex:none}
  .benefit .btop{display:flex;align-items:center;gap:12px}
  .benefit h3{font-size:18px;font-weight:800;color:var(--navy-900);letter-spacing:-.2px;line-height:1.3}
  .benefit .note-tag{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid #f6d2d6;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .benefit .detail{margin-top:15px;font-size:13.8px;color:var(--ink);background:var(--navy-50);border-radius:10px;padding:14px 15px;line-height:1.6}
  .benefit .detail .extra{display:block;margin-top:8px;font-size:12.5px;color:var(--muted)}
  .effect-title{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--navy-500);margin:18px 0 10px;text-transform:uppercase}
  .effect{display:flex;gap:12px;margin-bottom:12px}
  .effect:last-child{margin-bottom:0}
  .effect .ei{flex:none;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:7px}
  .effect .et b{display:block;font-size:14px;color:var(--navy-900);font-weight:800}
  .effect .et span{font-size:13px;color:var(--muted)}

  /* ===== 제휴 사례 ===== */
  .case-hero{display:flex;align-items:center;gap:14px;background:var(--navy-900);color:#fff;border-radius:14px;padding:20px 24px;box-shadow:var(--shadow);margin-bottom:22px;flex-wrap:wrap}
  .case-hero .pill{font-size:12px;font-weight:700;color:#fff;background:var(--accent);padding:5px 13px;border-radius:20px}
  .case-hero .ch-title{font-size:19px;font-weight:800;letter-spacing:-.3px}
  .case-hero .ch-sub{font-size:13px;color:#c4c4c4;margin-left:auto}
  .goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  @media(max-width:760px){.goal-grid{grid-template-columns:1fr}}
  .goal{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px;box-shadow:var(--shadow);border-top:3px solid var(--navy-700)}
  .goal .gk{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--accent);text-transform:uppercase}
  .goal .gt{font-size:15px;font-weight:800;color:var(--navy-900);margin:7px 0 6px}
  .goal .gd{font-size:13px;color:var(--muted);line-height:1.55}
  .case-cols{display:grid;grid-template-columns:1fr 1.15fr;gap:22px;align-items:start}
  @media(max-width:880px){.case-cols{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px 22px;box-shadow:var(--shadow)}
  .panel h4{font-size:14px;font-weight:800;color:var(--navy-900);display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .panel h4::before{content:"";width:4px;height:15px;background:var(--accent);border-radius:3px}
  .clist{list-style:none}
  .clist li{position:relative;padding:8px 0 8px 24px;font-size:13.8px;color:var(--ink);border-top:1px solid var(--line)}
  .clist li:first-child{border-top:none}
  .clist li::before{content:"✓";position:absolute;left:0;top:8px;color:var(--accent);font-weight:800}
  .eff-list{list-style:none}
  .eff-list li{padding:11px 0;border-top:1px solid var(--line)}
  .eff-list li:first-child{border-top:none}
  .eff-list .lab{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--navy-900)}
  .eff-list .lab .badge{font-size:10.5px;font-weight:800;color:#fff;background:var(--navy-700);padding:3px 9px;border-radius:6px;letter-spacing:.4px}
  .eff-list .dsc{margin-top:5px;font-size:13px;color:var(--muted);line-height:1.55}

  /* ===== 프로세스 ===== */
  .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin:8px 0 28px}
  @media(max-width:760px){.flow{grid-template-columns:1fr;gap:12px}}
  .flow .fstep{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 16px;box-shadow:var(--shadow);position:relative;text-align:center}
  .flow .fstep .fn{width:36px;height:36px;border-radius:11px;background:var(--navy-900);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 11px}
  .flow .fstep b{display:block;font-size:14px;color:var(--navy-900);font-weight:800}
  .flow .fstep span{display:block;font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}
  .flow .fstep::after{content:"›";position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--navy-300);font-size:22px;font-weight:800;z-index:2}
  .flow .fstep:last-child::after{display:none}
  @media(max-width:760px){
    .flow .fstep::after{content:"⌄";right:auto;left:50%;top:auto;bottom:-14px;transform:translateX(-50%)}
  }
  .flow .fstep.hi .fn{background:var(--accent)}
  .timeline-note{background:var(--accent-soft);border:1px solid #f6d2d6;border-radius:12px;padding:16px 18px;font-size:14px;color:var(--navy-800);display:flex;align-items:center;gap:12px}
  .timeline-note .big{font-size:22px;font-weight:800;color:var(--accent);white-space:nowrap}

  .policy{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);margin-top:26px}
  .policy .row{display:grid;grid-template-columns:130px 1fr;border-top:1px solid var(--line)}
  .policy .row:first-child{border-top:none}
  .policy .k{background:var(--navy-50);padding:13px 15px;font-weight:700;color:var(--navy-800);font-size:13.5px;display:flex;align-items:center}
  .policy .v{padding:13px 16px;font-size:13.5px;color:var(--ink)}
  .policy .v a{color:var(--navy-600);font-weight:600}

  .note{margin-top:18px;font-size:12.5px;color:var(--muted);background:var(--accent-soft);border:1px solid #f6d2d6;border-radius:10px;padding:12px 14px}

  /* ===== 이미지 (PDF 추출) ===== */
  .intro-2col{display:grid;grid-template-columns:290px 1fr;gap:36px;align-items:start}
  @media(max-width:880px){.intro-2col{grid-template-columns:1fr;gap:24px}}
  .intro-phone{display:flex;justify-content:center}
  .intro-phone .phone{width:100%;max-width:290px;border-radius:24px;box-shadow:0 14px 38px rgba(20,20,20,.22)}
  .intro-2col .stat-grid{grid-template-columns:repeat(2,1fr)}
  .intro-2col .demo-grid{grid-template-columns:repeat(3,1fr)}
  @media(max-width:560px){.intro-2col .demo-grid{grid-template-columns:1fr}}
  .benefit .preview{background:#f2f2f2;border:1px solid var(--line);border-radius:11px;height:190px;display:flex;align-items:center;justify-content:center;padding:12px;margin:16px 0 4px;overflow:hidden}
  .benefit .preview img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:6px;cursor:zoom-in;transition:transform .15s}
  .benefit .preview img:hover{transform:scale(1.02)}
  .case-shots{margin-top:26px}
  .shot{margin-bottom:20px}
  .shot .shot-lab{font-size:13.5px;font-weight:800;color:var(--navy-900);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .shot .shot-lab::before{content:"";width:4px;height:15px;background:var(--accent);border-radius:3px}
  .shot .shot-img{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fafafa;box-shadow:var(--shadow)}
  .shot .shot-img img{display:block;width:100%;height:auto;cursor:zoom-in}

  /* lightbox */
  .lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(20,20,20,.85);backdrop-filter:blur(2px);padding:32px;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:94vw;max-height:92vh;width:auto;height:auto;border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,.5)}
  .lightbox .lb-close{position:fixed;top:20px;right:26px;width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lightbox .lb-close:hover{background:rgba(255,255,255,.28)}

  /* pager */
  .pager{display:flex;justify-content:space-between;gap:12px;margin-top:38px;padding-top:22px;border-top:1px solid var(--line)}
  .pager button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 18px;font-size:13.5px;color:var(--navy-800);font-weight:600;display:flex;align-items:center;gap:8px;transition:.13s;box-shadow:var(--shadow)}
  .pager button:hover:not(:disabled){border-color:var(--navy-500);color:var(--navy-600)}
  .pager button:disabled{opacity:.35;cursor:default}
  .pager .next{background:var(--navy-700);color:#fff;border-color:var(--navy-700)}
  .pager .next:hover:not(:disabled){background:var(--navy-600)}

  .foot-legal{margin-top:30px;font-size:11.5px;color:#9a9a9a;text-align:center}

  /* responsive sidebar */
  @media(max-width:1024px){
    .sidebar{transform:translateX(-100%)}
    body.nav-open .sidebar{transform:translateX(0);box-shadow:0 0 40px rgba(13,27,52,.25)}
    .main{margin-left:0}
    body.nav-open .scrim{display:block;position:fixed;inset:var(--topbar-h) 0 0 0;background:rgba(13,27,52,.4);z-index:15}
  }
  @media(max-width:680px){
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .demo-grid{grid-template-columns:1fr}
    .goal-grid{grid-template-columns:1fr}
    .page-wrap{padding:24px 18px 50px}
    .brand .sub{display:none}
    .page h1{font-size:22px}
    .page .lead{font-size:14px}
    .cover{padding:38px 24px;border-radius:14px}
    .cover .logo{font-size:24px}
    .cover h1{font-size:26px;margin-top:16px}
    .cover .en{font-size:14px}
    #page-cover{min-height:auto}
    .stat .num{font-size:21px}
    .policy .row{grid-template-columns:1fr}
    .policy .k{border-bottom:1px solid var(--line)}
    .pager button{padding:13px 16px}
    .toc .sub li a{padding-top:10px;padding-bottom:10px}
    .case-hero .ch-sub{margin-left:0;width:100%}
  }
  @media(max-width:430px){
    .stat-grid{grid-template-columns:1fr}
    .page-wrap{padding:20px 14px 44px}
    .page h1{font-size:20px}
    .cover{padding:32px 20px}
    .cover h1{font-size:23px}
    .pager{flex-direction:column}
    .pager button{width:100%;justify-content:center}
    .topbar{padding:0 14px;gap:12px}
    .brand .logo{font-size:16px}
  }
</style>
</head>
<body>

<!-- ===== Top bar ===== -->
<header class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="목차 열기/닫기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <div class="brand">
    <span class="logo">NHN LINK<span class="dot"> | </span>ticketLINK</span>
    <span class="sub">2026 제휴 제안서</span>
  </div>
  <span class="ver">광고프로모션팀</span>
</header>

<div class="scrim" id="scrim"></div>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="toc-head">목차 · CONTENTS</div>
    <ul class="toc" id="toc"></ul>
  </nav>
  <main class="main">
    <div class="page-wrap" id="pages"></div>
  </main>
</div>

const groups = [];

  const lis = g.items.map(p=>`<li><a data-id="${p.id}">${p.nav}</a></li>`).join('');
  return `<li class="grp">

/* 동작 */
const pageEls = [...document.querySelectorAll('.page')];
const links = [...document.querySelectorAll('.toc .sub a')];
let idx = 0;

function show(i){
  idx = Math.max(0, Math.min(PAGES.length-1, i));
  const id = PAGES[idx].id;
  pageEls.forEach(el=>el.classList.toggle('active', el.id==='page-'+id));
  links.forEach(a=>a.classList.toggle('active', a.dataset.id===id));
  document.getElementById('prevBtn').disabled = idx===0;
  document.getElementById('nextBtn').disabled = idx===PAGES.length-1;
  const grpName = PAGES[idx].group;
  [...document.querySelectorAll('.toc .grp')].forEach((grpEl,gi)=>{
    if(groups[gi].name===grpName) grpEl.classList.remove('collapsed');
  });
  window.scrollTo({top:0, behavior:'smooth'});
  if(window.innerWidth<=1024) document.body.classList.remove('nav-open');
}

links.forEach(a=>a.addEventListener('click', ()=>{
  const i = PAGES.findIndex(p=>p.id===a.dataset.id);
  if(i>=0) show(i);
}));

document.getElementById('prevBtn').addEventListener('click', ()=>show(idx-1));
document.getElementById('nextBtn').addEventListener('click', ()=>show(idx+1));

[...document.querySelectorAll('.toc .grp > button')].forEach(btn=>{
  btn.addEventListener('click', ()=> btn.parentElement.classList.toggle('collapsed'));
});

const menuBtn = document.getElementById('menuBtn');
const scrim = document.getElementById('scrim');
menuBtn.addEventListener('click', ()=>{
  if(window.innerWidth<=1024) document.body.classList.toggle('nav-open');
  else document.body.classList.toggle('nav-collapsed');
});
scrim.addEventListener('click', ()=>document.body.classList.remove('nav-open'));

const lightbox = document.createElement('div');
lightbox.className = 'lightbox';
lightbox.innerHTML = '<button class="lb-close" aria-label="닫기">&times;</button><img alt="">';
document.body.appendChild(lightbox);
const lbImg = lightbox.querySelector('img');
function closeLightbox(){ lightbox.classList.remove('open'); lbImg.src=''; }
pagesEl.addEventListener('click', e=>{
  const t = e.target.closest('.preview img, .shot-img img');
  if(!t) return;
  lbImg.src = t.src; lbImg.alt = t.alt||'';
  lightbox.classList.add('open');
});
lightbox.addEventListener('click', closeLightbox);

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='Escape' && lightbox.classList.contains('open')){ closeLightbox(); return; }
  if(e.key==='ArrowRight') show(idx+1);
  if(e.key==='ArrowLeft') show(idx-1);
});

show(0);
</script>
</body>
</html>
